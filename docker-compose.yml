#version: '3.8'

services:

  # PHP Service
  php:
    build:
      dockerfile: php-dockerfile
    volumes:
      - './php-files:/var/www/html'
    depends_on:
      - mariadb

  # Nginx Service
  nginx:
    image: nginx:latest
    ports:
      - 8085:80
      - 8443:443
    links:
      - 'php'
    volumes:
      - './php-files:/var/www/html'
      - './nginx-conf/nginx.conf:/etc/nginx/conf.d/default.conf:ro'
      - './certs:/etc/ssl'
    depends_on:
      - php

  # MariaDB Service
  mariadb:
    image: mariadb:10.9
    environment:
      MYSQL_ROOT_PASSWORD: adminmariadb
      MYSQL_DATABASE: web_app
      MYSQL_USER: rapidcode
      MYSQL_PASSWORD: password
    volumes:
      - './mysql-data:/var/lib/mysql'

  # phpMyAdmin Service
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    ports:
      - 8080:80
    environment:
      PMA_HOST: mariadb
    depends_on:
      - mariadb

  # React Service
  react:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true

volumes:
  mysqldata: